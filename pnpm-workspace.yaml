pmOnFail: ignore
# One-time cooldown exemptions (pnpm minimumReleaseAge): these exact versions were <24h old at adoption time; safe to delete once aged.
minimumReleaseAgeExclude:
  - '@arethetypeswrong/cli@0.18.5'
  - '@arethetypeswrong/core@0.18.5'

# Packages allowed to run install scripts (pnpm 11 blocks by default).
allowBuilds:
  lefthook: true
